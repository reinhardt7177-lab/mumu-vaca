<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>4학년 사회 퀴즈 레이싱 - OutRun Edition</title>
  <style>
    :root {
      --bg-top: #00122e;
      --bg-bottom: #020813;
      --frame-1: #812010;
      --frame-2: #2f100f;
      --hud-text: #f7eb78;
      --panel: #0a1532dd;
      --panel-border: #8cc3ff;
      --white: #f8fcff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #12325d, #020713 72%);
      color: var(--white);
      font-family: "Courier New", "Malgun Gothic", monospace;
      user-select: none;
    }

    #app {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    #cabinet {
      width: min(96vw, calc(96vh * 9 / 16));
      max-width: 520px;
      aspect-ratio: 9 / 16;
      background: linear-gradient(180deg, var(--frame-1), var(--frame-2));
      border-radius: 14px;
      box-shadow: 0 0 0 5px #220f10, 0 16px 48px #000b;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    #cabinet::before,
    #cabinet::after {
      content: "";
      position: absolute;
      top: 20%;
      bottom: 18%;
      width: 14px;
      background: repeating-linear-gradient(
        180deg,
        #1f1f28 0px,
        #1f1f28 6px,
        #c8391f 6px,
        #c8391f 22px
      );
      opacity: 0.95;
      border-radius: 6px;
    }

    #cabinet::before {
      left: 4px;
      transform: skewY(14deg);
    }

    #cabinet::after {
      right: 4px;
      transform: skewY(-14deg);
    }

    #gameShell {
      position: relative;
      width: 100%;
      height: 100%;
      border: 4px solid #9ca8bb;
      border-radius: 10px;
      overflow: hidden;
      background: #03112a;
    }

    #game {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    #hud {
      position: absolute;
      inset: 8px 8px auto 8px;
      z-index: 5;
      pointer-events: none;
    }

    #topHud {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 6px;
    }

    .hudStat {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #09122bcf;
      border: 2px solid #6aa4e8;
      border-radius: 7px;
      padding: 5px 7px;
      text-shadow: 1px 1px 0 #000;
      line-height: 1;
      min-height: 30px;
    }

    .hudLabel {
      color: #b7d7ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .hudValue {
      color: var(--hud-text);
      font-size: 14px;
      font-weight: 700;
    }

    #questionPanel {
      background: var(--panel);
      border: 2px solid var(--panel-border);
      border-radius: 9px;
      padding: 8px 10px;
      text-align: center;
      font-size: 12px;
      line-height: 1.28;
      text-shadow: 1px 1px 0 #000;
      min-height: 42px;
    }

    #feedback {
      position: absolute;
      left: 50%;
      top: 34%;
      transform: translateX(-50%);
      z-index: 6;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
      opacity: 0;
      white-space: nowrap;
    }

    #mobileHint {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 7;
      font-size: 11px;
      background: #091734c4;
      border: 1px solid #86b5f0;
      border-radius: 999px;
      padding: 4px 9px;
      color: #cde2ff;
      pointer-events: none;
    }

    #gameOver {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000a;
      z-index: 10;
    }

    #gameOver.hidden {
      display: none;
    }

    #gameOverPanel {
      width: min(84%, 320px);
      background: #0c1831f3;
      border: 3px solid #89b8fa;
      border-radius: 12px;
      text-align: center;
      padding: 18px 14px;
      box-shadow: 0 10px 24px #0008;
    }

    #gameOverPanel h2 {
      margin: 0 0 8px;
      color: #ffd35e;
      letter-spacing: 0.8px;
    }

    #gameOverPanel p {
      margin: 0 0 14px;
      font-size: 15px;
    }

    #restartBtn {
      border: 0;
      border-radius: 8px;
      background: #ffde72;
      color: #1a2746;
      font-weight: 700;
      font-size: 15px;
      padding: 9px 18px;
      cursor: pointer;
    }

    #restartBtn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="cabinet">
      <div id="gameShell">
        <canvas id="game" width="320" height="568" aria-label="OutRun 스타일 3차선 교육용 레이싱 게임"></canvas>

        <div id="hud">
          <div id="topHud">
            <div class="hudStat">
              <span class="hudLabel">TIME</span>
              <span class="hudValue" id="timeValue">99</span>
            </div>
            <div class="hudStat">
              <span class="hudLabel">SCORE</span>
              <span class="hudValue" id="scoreValue">0</span>
            </div>
            <div class="hudStat">
              <span class="hudLabel">LIFE</span>
              <span class="hudValue" id="livesValue">❤️❤️❤️</span>
            </div>
          </div>
          <div id="questionPanel">문제를 준비하는 중...</div>
        </div>

        <div id="feedback">정답!</div>
        <div id="mobileHint">좌/우 스와이프 또는 좌/우 터치</div>

        <div id="gameOver" class="hidden">
          <div id="gameOverPanel">
            <h2>GAME OVER</h2>
            <p>최종 점수: <strong id="finalScore">0</strong></p>
            <button id="restartBtn">다시 하기</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* =========================
       수정 포인트: 비주얼
    ========================= */
    const CONFIG_VISUAL = {
      CANVAS_WIDTH: 320,
      CANVAS_HEIGHT: 568,
      HORIZON_Y_RATIO: 0.34,
      ROAD_TOP_WIDTH: 52,
      ROAD_BOTTOM_WIDTH: 292,
      LANE_COUNT: 3,
      PLAYER_Y: 500,
      PLAYER_WIDTH: 68,
      PLAYER_HEIGHT: 44,
      PLAYER_COLOR: "#ef4d4d",
      SCANLINE_ALPHA: 0.11,
      VIGNETTE_ALPHA: 0.24,
      CURVE_AMPLITUDE: 44
    };

    /* =========================
       수정 포인트: 게임성
    ========================= */
    const CONFIG_GAMEPLAY = {
      BASE_SPEED: 150,
      MAX_SPEED: 290,
      SPEED_UP_PER_CORRECT: 16,
      SCORE_PER_CORRECT: 100,
      START_LIVES: 3,
      SIGN_Z_START: 0.08,
      SIGN_SPEED_DIV: 430,
      SHAKE_DURATION: 0.35,
      SHAKE_POWER: 6.5
    };

    /* =========================
       수정 포인트: 타이밍/연출
    ========================= */
    const CONFIG_TIMING = {
      TITLE_DURATION: 2.0,
      START_DURATION: 1.5,
      FEEDBACK_DURATION: 0.72,
      FLASH_DECAY: 1.8
    };

    /* =========================
       퀴즈 데이터
    ========================= */
    const quizData = [
      { question: "학교를 나타내는 지도 기호의 모양은?", correct: "깃발 모양", wrong: ["십자가 모양", "편지 봉투"] },
      { question: "우리 고장 강진을 대표하는 아름다운 도자기는?", correct: "고려청자", wrong: ["백자", "빗살무늬토기"] },
      { question: "다산 정약용 선생님이 머무르셨던 강진의 유적지는?", correct: "다산초당", wrong: ["수원화성", "불국사"] },
      { question: "집에 불이 났을 때 출동하여 불을 끄는 공공기관은?", correct: "소방서", wrong: ["경찰서", "보건소"] },
      { question: "도둑을 잡거나 교통정리를 하는 곳은?", correct: "경찰서", wrong: ["우체국", "시청"] }
    ];

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const W = CONFIG_VISUAL.CANVAS_WIDTH;
    const H = CONFIG_VISUAL.CANVAS_HEIGHT;
    const HORIZON_Y = H * CONFIG_VISUAL.HORIZON_Y_RATIO;

    const timeEl = document.getElementById("timeValue");
    const scoreEl = document.getElementById("scoreValue");
    const livesEl = document.getElementById("livesValue");
    const questionPanelEl = document.getElementById("questionPanel");
    const feedbackEl = document.getElementById("feedback");
    const gameOverEl = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    const PHASES = {
      TITLE: "TITLE",
      START_BANNER: "START_BANNER",
      PLAY: "PLAY",
      GAME_OVER: "GAME_OVER"
    };

    const game = {
      phase: PHASES.TITLE,
      phaseTimer: CONFIG_TIMING.TITLE_DURATION,
      lastTime: 0,
      score: 0,
      lives: CONFIG_GAMEPLAY.START_LIVES,
      speed: CONFIG_GAMEPLAY.BASE_SPEED,
      lane: 1,
      elapsed: 0,
      roadScroll: 0,
      curveClock: 0,
      quizBag: [],
      currentQuiz: null,
      signs: [],
      palms: [],
      clouds: [],
      feedback: {
        text: "",
        color: "#ffffff",
        timer: 0
      },
      shakeTimer: 0,
      flashTimer: 0,
      flashColor: "rgba(255,255,255,0)",
      playerRect: { x: 0, y: 0, w: 0, h: 0 }
    };

    let touchStartX = null;
    let touchStartY = null;
    let audioCtx = null;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function shuffle(arr) {
      const out = [...arr];
      for (let i = out.length - 1; i > 0; i--) {
        const j = (Math.random() * (i + 1)) | 0;
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function intersects(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function perspectiveT(z) {
      return Math.pow(clamp(z, 0, 1), 1.25);
    }

    function roadCenterAt(z) {
      const sway = Math.sin(game.curveClock * 0.9 + z * 6.2) * CONFIG_VISUAL.CURVE_AMPLITUDE;
      return W / 2 + sway * Math.pow(z, 1.75);
    }

    function projectLanePoint(z, laneOffset) {
      const t = perspectiveT(z);
      const y = lerp(HORIZON_Y + 8, H - 74, t);
      const halfRoad = lerp(CONFIG_VISUAL.ROAD_TOP_WIDTH / 2, CONFIG_VISUAL.ROAD_BOTTOM_WIDTH / 2, t);
      const center = roadCenterAt(z);
      const laneSpan = halfRoad * 0.5;
      return { x: center + laneOffset * laneSpan, y, t, halfRoad };
    }

    function wrapTextByChar(text, maxWidth, maxLines, font) {
      ctx.save();
      ctx.font = font;
      const lines = [];
      let line = "";
      for (const ch of text) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
          if (lines.length >= maxLines) break;
        } else {
          line = test;
        }
      }
      if (line && lines.length < maxLines) lines.push(line);
      ctx.restore();
      return lines;
    }

    function unlockAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    }

    function playCorrectSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(620, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.14);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.19);
    }

    function playWrongSound() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(190, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.2);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.24);
    }

    function setFeedback(text, color) {
      game.feedback.text = text;
      game.feedback.color = color;
      game.feedback.timer = CONFIG_TIMING.FEEDBACK_DURATION;
      feedbackEl.textContent = text;
      feedbackEl.style.color = color;
      feedbackEl.style.opacity = "1";
    }

    function refillQuizBag() {
      game.quizBag = shuffle(quizData);
    }

    function nextQuiz() {
      if (game.quizBag.length === 0) refillQuizBag();
      return game.quizBag.pop();
    }

    function spawnQuestionRow() {
      const quiz = nextQuiz();
      game.currentQuiz = quiz;
      questionPanelEl.textContent = quiz.question;

      const shuffled = shuffle([
        { text: quiz.correct, isCorrect: true },
        { text: quiz.wrong[0], isCorrect: false },
        { text: quiz.wrong[1], isCorrect: false }
      ]);

      game.signs = shuffled.map((choice, lane) => ({
        lane,
        text: choice.text,
        isCorrect: choice.isCorrect,
        z: CONFIG_GAMEPLAY.SIGN_Z_START
      }));
    }

    function makePalm() {
      return {
        side: Math.random() < 0.5 ? -1 : 1,
        z: Math.random(),
        speedJitter: 0.75 + Math.random() * 0.7
      };
    }

    function makeCloud() {
      return {
        x: Math.random() * W,
        y: 24 + Math.random() * (HORIZON_Y - 28),
        width: 28 + Math.random() * 38,
        speed: 4 + Math.random() * 5
      };
    }

    function initScenery() {
      game.palms = [];
      for (let i = 0; i < 16; i++) game.palms.push(makePalm());
      game.clouds = [];
      for (let i = 0; i < 8; i++) game.clouds.push(makeCloud());
    }

    function setPhase(phase, timer = 0) {
      game.phase = phase;
      game.phaseTimer = timer;
    }

    function startPlay() {
      setPhase(PHASES.PLAY);
      spawnQuestionRow();
      gameOverEl.classList.add("hidden");
    }

    function resetRun() {
      game.score = 0;
      game.lives = CONFIG_GAMEPLAY.START_LIVES;
      game.speed = CONFIG_GAMEPLAY.BASE_SPEED;
      game.lane = 1;
      game.elapsed = 0;
      game.roadScroll = 0;
      game.curveClock = 0;
      game.feedback.timer = 0;
      game.shakeTimer = 0;
      game.flashTimer = 0;
      game.flashColor = "rgba(255,255,255,0)";
      game.currentQuiz = null;
      game.signs = [];
      refillQuizBag();
      initScenery();
      questionPanelEl.textContent = "문제를 준비하는 중...";
      gameOverEl.classList.add("hidden");
      setPhase(PHASES.TITLE, CONFIG_TIMING.TITLE_DURATION);
      updateHud();
    }

    function updateHud() {
      const timerArcade = Math.max(0, 99 - Math.floor(game.elapsed));
      timeEl.textContent = String(timerArcade).padStart(2, "0");
      scoreEl.textContent = String(game.score);
      livesEl.textContent = "❤️".repeat(game.lives) + "🖤".repeat(CONFIG_GAMEPLAY.START_LIVES - game.lives);
    }

    function getPlayerRect() {
      const p = projectLanePoint(0.94, game.lane - 1);
      const x = p.x - CONFIG_VISUAL.PLAYER_WIDTH / 2;
      const y = CONFIG_VISUAL.PLAYER_Y;
      return { x, y, w: CONFIG_VISUAL.PLAYER_WIDTH, h: CONFIG_VISUAL.PLAYER_HEIGHT };
    }

    function signRect(sign) {
      const p = projectLanePoint(sign.z, sign.lane - 1);
      const scale = lerp(0.4, 1.5, p.t);
      const w = 44 * scale;
      const h = 27 * scale;
      const x = p.x - w / 2;
      const y = p.y - h - 15 * scale;
      return {
        x,
        y,
        w,
        h,
        poleX: p.x - 2 * scale,
        poleY: y + h,
        poleW: 4 * scale,
        poleH: 19 * scale,
        t: p.t
      };
    }

    function onAnswerHit(sign) {
      if (sign.isCorrect) {
        game.score += CONFIG_GAMEPLAY.SCORE_PER_CORRECT;
        game.speed = Math.min(CONFIG_GAMEPLAY.MAX_SPEED, game.speed + CONFIG_GAMEPLAY.SPEED_UP_PER_CORRECT);
        setFeedback("정답! +100", "#84ffa9");
        game.flashColor = "rgba(120,255,160,0.24)";
        game.flashTimer = 0.14;
        playCorrectSound();
      } else {
        game.lives -= 1;
        game.speed = CONFIG_GAMEPLAY.BASE_SPEED;
        setFeedback("오답! 생명력 -1", "#ff9a9a");
        game.flashColor = "rgba(255,95,95,0.22)";
        game.flashTimer = 0.18;
        game.shakeTimer = CONFIG_GAMEPLAY.SHAKE_DURATION;
        playWrongSound();
      }

      updateHud();

      if (game.lives <= 0) {
        setPhase(PHASES.GAME_OVER);
        finalScoreEl.textContent = String(game.score);
        gameOverEl.classList.remove("hidden");
        return;
      }

      spawnQuestionRow();
    }

    function handleDirectionalInput(dir) {
      unlockAudio();

      if (game.phase === PHASES.TITLE) {
        setPhase(PHASES.START_BANNER, CONFIG_TIMING.START_DURATION);
        return;
      }

      if (game.phase === PHASES.START_BANNER) {
        startPlay();
        return;
      }

      if (game.phase !== PHASES.PLAY) return;
      game.lane = clamp(game.lane + dir, 0, CONFIG_VISUAL.LANE_COUNT - 1);
    }

    function handleStartInput() {
      unlockAudio();
      if (game.phase === PHASES.TITLE) {
        setPhase(PHASES.START_BANNER, CONFIG_TIMING.START_DURATION);
      } else if (game.phase === PHASES.START_BANNER) {
        startPlay();
      }
    }

    function updateClouds(dt) {
      for (const cloud of game.clouds) {
        cloud.x += cloud.speed * dt;
        if (cloud.x > W + cloud.width) {
          cloud.x = -cloud.width;
          cloud.y = 20 + Math.random() * (HORIZON_Y - 28);
          cloud.width = 24 + Math.random() * 40;
          cloud.speed = 4 + Math.random() * 5;
        }
      }
    }

    function updatePalms(dt) {
      for (const palm of game.palms) {
        palm.z += dt * (game.speed / CONFIG_GAMEPLAY.SIGN_SPEED_DIV) * palm.speedJitter * 0.9;
        if (palm.z > 1.15) {
          palm.side = Math.random() < 0.5 ? -1 : 1;
          palm.z = 0.03 + Math.random() * 0.08;
          palm.speedJitter = 0.75 + Math.random() * 0.7;
        }
      }
    }

    function updatePlay(dt) {
      game.elapsed += dt;
      game.curveClock += dt;
      game.roadScroll += game.speed * dt;
      updateClouds(dt);
      updatePalms(dt);

      for (const sign of game.signs) {
        sign.z += dt * (game.speed / CONFIG_GAMEPLAY.SIGN_SPEED_DIV);
      }

      game.playerRect = getPlayerRect();
      for (const sign of game.signs) {
        const r = signRect(sign);
        const hitRect = {
          x: r.x + r.w * 0.12,
          y: r.y + r.h * 0.1,
          w: r.w * 0.76,
          h: r.h * 0.82
        };
        if (intersects(hitRect, game.playerRect)) {
          onAnswerHit(sign);
          break;
        }
      }

      if (game.signs.length > 0 && game.signs[0].z > 1.1) {
        spawnQuestionRow();
      }
    }

    function updatePhase(dt) {
      if (game.phase === PHASES.TITLE) {
        game.phaseTimer -= dt;
        game.curveClock += dt * 0.6;
        game.roadScroll += CONFIG_GAMEPLAY.BASE_SPEED * 0.3 * dt;
        updateClouds(dt);
        updatePalms(dt * 0.6);
        if (game.phaseTimer <= 0) setPhase(PHASES.START_BANNER, CONFIG_TIMING.START_DURATION);
      } else if (game.phase === PHASES.START_BANNER) {
        game.phaseTimer -= dt;
        game.curveClock += dt * 0.9;
        game.roadScroll += CONFIG_GAMEPLAY.BASE_SPEED * 0.55 * dt;
        updateClouds(dt);
        updatePalms(dt * 0.8);
        if (game.phaseTimer <= 0) startPlay();
      } else if (game.phase === PHASES.PLAY) {
        updatePlay(dt);
      } else if (game.phase === PHASES.GAME_OVER) {
        game.curveClock += dt * 0.2;
      }

      if (game.shakeTimer > 0) game.shakeTimer -= dt;
      if (game.flashTimer > 0) game.flashTimer = Math.max(0, game.flashTimer - dt * CONFIG_TIMING.FLASH_DECAY);
      if (game.feedback.timer > 0) {
        game.feedback.timer -= dt;
        feedbackEl.style.opacity = String(Math.max(0, game.feedback.timer / CONFIG_TIMING.FEEDBACK_DURATION));
      } else {
        feedbackEl.style.opacity = "0";
      }

      updateHud();
    }

    function drawSky() {
      for (let y = 0; y < HORIZON_Y; y++) {
        const t = y / HORIZON_Y;
        const r = Math.round(26 + 40 * t);
        const g = Math.round(98 + 94 * t);
        const b = Math.round(188 + 58 * t);
        ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
        ctx.fillRect(0, y, W, 1);
      }

      ctx.fillStyle = "#36e7da";
      ctx.fillRect(0, HORIZON_Y, W, 26);

      ctx.fillStyle = "#24bb87";
      ctx.fillRect(0, HORIZON_Y + 26, W, 8);

      ctx.fillStyle = "#d8b27a";
      ctx.fillRect(0, HORIZON_Y + 34, W, 4);

      ctx.fillStyle = "#6f8ca6";
      ctx.beginPath();
      ctx.moveTo(0, HORIZON_Y + 27);
      for (let x = 0; x <= W; x += 8) {
        const y = HORIZON_Y + 20 + Math.sin(x * 0.06 + game.curveClock * 0.4) * 2;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, HORIZON_Y + 34);
      ctx.lineTo(0, HORIZON_Y + 34);
      ctx.closePath();
      ctx.fill();
    }

    function drawClouds() {
      ctx.fillStyle = "#f4fbff";
      for (const cloud of game.clouds) {
        const x = cloud.x;
        const y = cloud.y;
        const w = cloud.width;
        ctx.fillRect(x, y, w, 6);
        ctx.fillRect(x + 6, y - 5, w * 0.5, 5);
        ctx.fillRect(x + w * 0.4, y + 2, w * 0.45, 4);
      }
    }

    function drawRoad() {
      const bottom = H;
      for (let y = HORIZON_Y + 8; y < bottom; y++) {
        const t = (y - HORIZON_Y) / (bottom - HORIZON_Y);
        const z = Math.pow(t, 1.04);
        const center = roadCenterAt(z);
        const halfRoad = lerp(CONFIG_VISUAL.ROAD_TOP_WIDTH / 2, CONFIG_VISUAL.ROAD_BOTTOM_WIDTH / 2, Math.pow(t, 1.2));
        const left = center - halfRoad;
        const right = center + halfRoad;

        const stripeIdx = ((game.roadScroll * 0.09 + y * 0.08) | 0) & 1;
        ctx.fillStyle = stripeIdx ? "#4d8e47" : "#66aa56";
        ctx.fillRect(0, y, left, 1);
        ctx.fillRect(right, y, W - right, 1);

        ctx.fillStyle = stripeIdx ? "#73747a" : "#64656b";
        ctx.fillRect(left, y, right - left, 1);

        const rumbleIdx = ((game.roadScroll * 0.17 + y * 0.18) | 0) & 1;
        ctx.fillStyle = rumbleIdx ? "#f8f8f8" : "#ff5555";
        ctx.fillRect(left - 4, y, 4, 1);
        ctx.fillRect(right, y, 4, 1);

        if (t > 0.1) {
          const laneDash = ((game.roadScroll * 0.19 + y * 0.34) | 0) % 22;
          if (laneDash < 13) {
            ctx.fillStyle = "#f0f0f0";
            for (let i = 1; i < CONFIG_VISUAL.LANE_COUNT; i++) {
              const laneX = left + (i / CONFIG_VISUAL.LANE_COUNT) * (right - left);
              ctx.fillRect(laneX - 1, y, 2, 1);
            }
          }
        }
      }
    }

    function drawPalms() {
      const sorted = [...game.palms].sort((a, b) => a.z - b.z);
      for (const palm of sorted) {
        const p = projectLanePoint(palm.z, palm.side * 1.7);
        const s = lerp(0.3, 1.9, p.t);
        const x = p.x | 0;
        const y = (p.y - 42 * s) | 0;
        const trunkW = Math.max(2, (3 * s) | 0);
        const trunkH = Math.max(8, (24 * s) | 0);
        ctx.fillStyle = "#8b5f39";
        ctx.fillRect(x, y + 14 * s, trunkW, trunkH);

        ctx.fillStyle = "#0f9349";
        const leaf = Math.max(4, (10 * s) | 0);
        ctx.fillRect(x - leaf, y + 8 * s, leaf * 2, 2);
        ctx.fillRect(x - (leaf * 0.7), y + 4 * s, leaf * 1.4, 2);
        ctx.fillRect(x - (leaf * 0.55), y + 12 * s, leaf * 1.1, 2);
        ctx.fillRect(x - 2, y + 2 * s, 4, 2);
      }
    }

    function drawSigns() {
      const ordered = [...game.signs].sort((a, b) => a.z - b.z);
      for (const sign of ordered) {
        const r = signRect(sign);
        ctx.fillStyle = "#8b6441";
        ctx.fillRect(r.poleX, r.poleY, r.poleW, r.poleH);

        ctx.fillStyle = "#fbfdff";
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.strokeStyle = "#1f1f25";
        ctx.lineWidth = Math.max(1, r.t * 2.2);
        ctx.strokeRect(r.x, r.y, r.w, r.h);

        ctx.fillStyle = sign.isCorrect ? "#1a6651" : "#734848";
        ctx.fillRect(r.x + 1, r.y + 1, r.w - 2, Math.max(4, r.h * 0.16));

        const fontSize = Math.max(8, Math.round(7 + r.t * 9));
        const font = "bold " + fontSize + "px \"Malgun Gothic\", sans-serif";
        const lines = wrapTextByChar(sign.text, r.w - 8, 2, font);
        ctx.fillStyle = "#0f1a2f";
        ctx.font = font;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const lineGap = Math.max(8, fontSize + 1);
        let yy = r.y + Math.max(5, r.h * 0.28);
        for (const line of lines) {
          ctx.fillText(line, r.x + r.w / 2, yy);
          yy += lineGap;
        }
      }
    }

    function drawCar() {
      const p = game.playerRect;
      const x = p.x | 0;
      const y = p.y | 0;
      const w = p.w | 0;
      const h = p.h | 0;

      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.fillRect(x + 6, y + h - 3, w - 12, 4);

      ctx.fillStyle = "#111318";
      ctx.fillRect(x - 2, y + 8, 4, 12);
      ctx.fillRect(x + w - 2, y + 8, 4, 12);
      ctx.fillRect(x - 2, y + h - 16, 4, 12);
      ctx.fillRect(x + w - 2, y + h - 16, 4, 12);

      ctx.fillStyle = CONFIG_VISUAL.PLAYER_COLOR;
      ctx.fillRect(x, y + 4, w, h - 6);

      ctx.fillStyle = "#8dd4ff";
      ctx.fillRect(x + 10, y + 8, w - 20, 10);

      ctx.fillStyle = "#f2c182";
      ctx.fillRect(x + 18, y + 9, 8, 7);
      ctx.fillRect(x + w - 26, y + 9, 8, 7);

      ctx.fillStyle = "#ffe484";
      ctx.fillRect(x + (w >> 1) - 1, y + 5, 2, h - 9);

      ctx.fillStyle = "#ff8e8e";
      ctx.fillRect(x + 5, y + h - 6, 7, 3);
      ctx.fillRect(x + w - 12, y + h - 6, 7, 3);
    }

    function drawStartBanner() {
      if (game.phase !== PHASES.START_BANNER) return;
      const pulse = 0.7 + 0.3 * Math.sin((CONFIG_TIMING.START_DURATION - game.phaseTimer) * 8);
      const bannerY = H * 0.47;
      ctx.fillStyle = "rgba(255,255,255,0.88)";
      ctx.fillRect(22, bannerY, W - 44, 56);
      ctx.strokeStyle = "#d33e2f";
      ctx.lineWidth = 4;
      ctx.strokeRect(22, bannerY, W - 44, 56);

      ctx.fillStyle = "#cc2b24";
      ctx.font = "bold 44px \"Courier New\", monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("START", W / 2, bannerY + 30);

      ctx.fillStyle = "rgba(255,233,128," + pulse.toFixed(3) + ")";
      ctx.font = "bold 24px \"Courier New\", monospace";
      ctx.fillText("STAGE 1", W / 2, bannerY + 78);
    }

    function drawTitleOverlay() {
      if (game.phase !== PHASES.TITLE) return;
      ctx.fillStyle = "rgba(3,8,18,0.58)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#f9ea79";
      ctx.font = "bold 36px \"Courier New\", monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("SOCIAL RACING", W / 2, H * 0.18);

      ctx.fillStyle = "#e7f4ff";
      ctx.font = "bold 18px \"Courier New\", monospace";
      ctx.fillText("SELECT LANE BY STEERING", W / 2, H * 0.28);

      ctx.fillStyle = "#ff635a";
      ctx.font = "bold 24px \"Courier New\", monospace";
      ctx.fillText("GRADE 4 REVIEW", W / 2, H * 0.36);

      const blink = Math.sin((CONFIG_TIMING.TITLE_DURATION - game.phaseTimer) * 7) > -0.1;
      if (blink) {
        ctx.fillStyle = "#f8f8f8";
        ctx.font = "bold 16px \"Courier New\", monospace";
        ctx.fillText("TAP OR ARROW TO START", W / 2, H * 0.46);
      }
    }

    function drawCrtEffects() {
      ctx.fillStyle = "rgba(0,0,0," + CONFIG_VISUAL.SCANLINE_ALPHA + ")";
      for (let y = 0; y < H; y += 3) {
        ctx.fillRect(0, y, W, 1);
      }

      const grad = ctx.createRadialGradient(W * 0.5, H * 0.5, H * 0.25, W * 0.5, H * 0.5, H * 0.72);
      grad.addColorStop(0, "rgba(0,0,0,0)");
      grad.addColorStop(1, "rgba(0,0,0," + CONFIG_VISUAL.VIGNETTE_ALPHA + ")");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "rgba(255,255,255,0.14)";
      ctx.lineWidth = 3;
      ctx.strokeRect(1.5, 1.5, W - 3, H - 3);
    }

    function drawFlash() {
      if (game.flashTimer <= 0) return;
      const alpha = clamp(game.flashTimer, 0, 1);
      const color = game.flashColor.replace(/[\d.]+\)$/, alpha.toFixed(3) + ")");
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, W, H);
    }

    function render() {
      ctx.clearRect(0, 0, W, H);

      let shakeX = 0;
      let shakeY = 0;
      if (game.shakeTimer > 0) {
        shakeX = (Math.random() - 0.5) * CONFIG_GAMEPLAY.SHAKE_POWER * 2;
        shakeY = (Math.random() - 0.5) * CONFIG_GAMEPLAY.SHAKE_POWER * 2;
      }

      ctx.save();
      ctx.translate(Math.round(shakeX), Math.round(shakeY));
      drawSky();
      drawClouds();
      drawRoad();
      drawPalms();
      drawSigns();
      game.playerRect = getPlayerRect();
      drawCar();
      drawStartBanner();
      drawTitleOverlay();
      ctx.restore();

      drawFlash();
      drawCrtEffects();
    }

    function gameLoop(ts) {
      if (!game.lastTime) game.lastTime = ts;
      const dt = Math.min(0.05, (ts - game.lastTime) / 1000);
      game.lastTime = ts;

      updatePhase(dt);
      render();
      requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        handleDirectionalInput(-1);
      } else if (e.key === "ArrowRight") {
        e.preventDefault();
        handleDirectionalInput(1);
      } else if (e.key === " " || e.key === "Enter") {
        e.preventDefault();
        handleStartInput();
      }
    });

    canvas.addEventListener("pointerdown", (e) => {
      unlockAudio();
      const rect = canvas.getBoundingClientRect();
      touchStartX = e.clientX - rect.left;
      touchStartY = e.clientY - rect.top;
      if (game.phase === PHASES.TITLE || game.phase === PHASES.START_BANNER) {
        handleStartInput();
      }
    });

    canvas.addEventListener("pointerup", (e) => {
      if (touchStartX === null || touchStartY === null) return;
      const rect = canvas.getBoundingClientRect();
      const endX = e.clientX - rect.left;
      const endY = e.clientY - rect.top;
      const dx = endX - touchStartX;
      const dy = endY - touchStartY;

      if (Math.abs(dx) > 22 && Math.abs(dx) > Math.abs(dy)) {
        handleDirectionalInput(dx > 0 ? 1 : -1);
      } else if (game.phase === PHASES.PLAY) {
        if (endX < rect.width * 0.4) handleDirectionalInput(-1);
        if (endX > rect.width * 0.6) handleDirectionalInput(1);
      }

      touchStartX = null;
      touchStartY = null;
    });

    canvas.addEventListener("pointercancel", () => {
      touchStartX = null;
      touchStartY = null;
    });

    restartBtn.addEventListener("click", () => {
      unlockAudio();
      resetRun();
    });

    resetRun();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
